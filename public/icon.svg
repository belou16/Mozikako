<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1c1e"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B78FF"/>
      <stop offset="50%" style="stop-color:#5856d6"/>
      <stop offset="100%" style="stop-color:#007aff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5856d6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#007aff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>
  <!-- Sound wave bars -->
  <g transform="translate(256, 256)" fill="url(#accent)">
    <rect x="-80" y="-50" width="20" height="100" rx="10"/>
    <rect x="-45" y="-80" width="20" height="160" rx="10"/>
    <rect x="-10" y="-100" width="20" height="200" rx="10"/>
    <rect x="25" y="-70" width="20" height="140" rx="10"/>
    <rect x="60" y="-40" width="20" height="80" rx="10"/>
  </g>
</svg>
